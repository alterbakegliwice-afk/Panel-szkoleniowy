name: Deploy do GitHub Pages

# Buduje aplikację (Vite) i publikuje folder dist/ na GitHub Pages.
# base:'./' w vite.config.js sprawia, że działa pod ścieżką /Panel-szkoleniowy/.
# Plik data/bank_pytan_seed.json jest serwowany, więc bank ładuje się z sieci
# (a nie tylko z kopii wbudowanej).

on:
  push:
    # main = źródło produkcji; poprzedni trigger wskazywał zmergowaną gałąź
    # roboczą, przez co strona przestałaby się aktualizować po kolejnych merge'ach.
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# jeden deploy naraz; nowszy anuluje starszy w kolejce
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
